name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,extract,dbt,dashboard]"
      - name: Lint
        run: ruff check .
      - name: dbt build (fixtures)
        env:
          SARVAULT_RAW_DIR: tests/fixtures/raw
        run: dbt build --project-dir dbt --profiles-dir dbt/profiles
      - name: Test
        run: pytest -q

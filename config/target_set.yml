# SARVault — compound universe definition (single source of truth; see SPEC.md §6.0).
# Changing scope = editing this file only (reproducible, reviewable, no code change).
#
# Target IDs verified against ChEMBL target report cards (2026-06). Human targets only.
# Activity volume is an ESTIMATE — confirm exact counts after the first M1 extract.
chembl_version: "36"
organism: "Homo sapiens"

# payload_class groups targets into ADC-payload mechanism classes. It is the
# single source of truth for the payload_class dimension (dbt seed + marts);
# regenerate the seed after editing here (see scripts/gen_payload_class_seed.py).
targets:
  # --- Tubulin inhibitors (auristatin / maytansinoid ADC payloads; taxanes, vinca) ---
  - chembl_id: "CHEMBL2095182"       # Tubulin (Homo sapiens, PROTEIN COMPLEX GROUP)
    label: "tubulin"                 # primary, high-coverage tubulin target
    payload_class: "tubulin_inhibitor"
  - chembl_id: "CHEMBL3832942"       # Tubulin beta (Homo sapiens, PROTEIN FAMILY)
    label: "tubulin_beta"            # complementary beta-tubulin coverage
    payload_class: "tubulin_inhibitor"

  # --- Topoisomerase inhibitors ---
  - chembl_id: "CHEMBL1781"          # DNA topoisomerase 1 (SINGLE PROTEIN; TOP1, UniProt P11387)
    label: "topoisomerase_i"         # camptothecin / exatecan (DXd) payload class
    payload_class: "topo1_inhibitor"
  - chembl_id: "CHEMBL1806"          # DNA topoisomerase 2-alpha (SINGLE PROTEIN; TOP2A, UniProt P11388)
    label: "topoisomerase_ii_alpha"  # anthracyclines (classical chemo)
    payload_class: "topo2_inhibitor"

activity:
  standard_types: ["IC50", "GI50", "Ki", "Kd", "EC50"]
  require_pchembl: true
  # Confidence-score floor. NOTE: single-protein targets (TOP1/TOP2A) carry
  # confidence 8-9, but the Tubulin COMPLEX GROUP / FAMILY targets carry ~4-7.
  # A floor of 8 would near-empty the tubulin set, so we keep it permissive
  # and inspect the confidence distribution after the first extract (M1).
  min_confidence_score: 5

# Reference ADC payloads (curated) for the cellular cytotoxicity pull (F3.2).
# molecule_chembl_ids resolved via the ChEMBL molecule endpoint (2026-07). Cellular
# GI50/IC50 (assay_type F) carry a raw standard_value but no pchembl_value, so they
# never enter the target-scoped fact_activity path; this compound-based pull lands
# them into a separate lineage (raw_cell_activities -> mart_compound_cytotoxicity).
reference_payloads:
  - {molecule_chembl_id: "CHEMBL65", name: "Camptothecin", payload_class: "topo1_inhibitor"}
  - {molecule_chembl_id: "CHEMBL1743143", name: "SN-38", payload_class: "topo1_inhibitor"}
  - {molecule_chembl_id: "CHEMBL1614650", name: "Exatecan", payload_class: "topo1_inhibitor"}
  - {molecule_chembl_id: "CHEMBL84", name: "Topotecan", payload_class: "topo1_inhibitor"}
  - {molecule_chembl_id: "CHEMBL481", name: "Irinotecan", payload_class: "topo1_inhibitor"}
  - {molecule_chembl_id: "CHEMBL2111084", name: "Belotecan", payload_class: "topo1_inhibitor"}
  - {molecule_chembl_id: "CHEMBL4082989", name: "MMAE", payload_class: "tubulin_inhibitor"}
  - {molecule_chembl_id: "CHEMBL5184029", name: "MMAF", payload_class: "tubulin_inhibitor"}
  - {molecule_chembl_id: "CHEMBL4802230", name: "Mertansine (DM1)", payload_class: "tubulin_inhibitor"}
  - {molecule_chembl_id: "CHEMBL292702", name: "Maytansine", payload_class: "tubulin_inhibitor"}

cell_activity:
  standard_types: ["GI50", "IC50"]
  assay_type: "F"   # functional / cell-based cytotoxicity

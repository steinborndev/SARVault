name: "sarvault"
version: "1.0.0"
config-version: 2

profile: "sarvault"

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  sarvault:
    staging:
      +schema: staging
      # Materialized as tables (not views) so the shipped warehouse.duckdb is
      # self-contained: a view would re-read the raw Parquet at query time, which
      # is absent in a deployment that ships only the .duckdb (e.g. Streamlit Cloud).
      +materialized: table
    marts:
      +schema: marts
      +materialized: table
    analytics:
      +schema: analytics
      +materialized: table

vars:
  standard_types: ["IC50", "GI50", "Ki", "Kd", "EC50"]
  min_confidence_score: 5
  # Activity-cliff floor (mart_activity_cliff). Kept permissive so the mart holds the
  # candidate space; the dashboard filters/ranks (by SALI) up from here. Chosen from
  # the real-data profile (scripts/profile_sar.py): T>=0.75 & |dpChEMBL|>=1.0.
  cliff_min_tanimoto: 0.75
  cliff_min_delta_pchembl: 1.0
  # Data-observability anomaly floors/ceilings (dbt/tests/assert_*). Defaults are sized
  # for the CI fixture; production overrides them to realistic volumes/tolerances.
  anomaly_min_rows: 3            # per-layer row-count floor
  anomaly_max_null_rate: 0.20   # ceiling on canonical_smiles null rate in dim_compound
  anomaly_pchembl_mean_low: 3.0  # pChEMBL mean plausibility band (lower)
  anomaly_pchembl_mean_high: 10.0  # pChEMBL mean plausibility band (upper)

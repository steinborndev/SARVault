name: "sarvault"
version: "1.0.0"
config-version: 2

profile: "sarvault"

model-paths: ["models"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  sarvault:
    staging:
      +schema: staging
      # Materialized as tables (not views) so the shipped warehouse.duckdb is
      # self-contained: a view would re-read the raw Parquet at query time, which
      # is absent in a deployment that ships only the .duckdb (e.g. Streamlit Cloud).
      +materialized: table
    marts:
      +schema: marts
      +materialized: table
    analytics:
      +schema: analytics
      +materialized: table

vars:
  standard_types: ["IC50", "GI50", "Ki", "Kd", "EC50"]
  min_confidence_score: 5

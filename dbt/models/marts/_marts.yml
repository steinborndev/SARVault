version: 2

models:
  - name: dim_compound
    description: "Compound dimension (one row per molecule)."
    columns:
      - name: compound_key
        tests: [unique, not_null]
      - name: molecule_chembl_id
        tests: [unique, not_null]

  - name: dim_target
    description: "Target dimension (one row per human target)."
    columns:
      - name: target_key
        tests: [unique, not_null]
      - name: target_chembl_id
        tests: [unique, not_null]
      - name: payload_class
        description: "ADC-payload mechanism class from config/target_set.yml (mirrored as the payload_classes dbt var)."

  - name: dim_assay
    description: "Assay dimension (one row per assay at/above the confidence floor)."
    columns:
      - name: assay_key
        tests: [unique, not_null]
      - name: assay_chembl_id
        tests: [unique, not_null]

  - name: dim_scaffold
    description: "Bemis-Murcko scaffold dimension (one row per distinct scaffold)."
    columns:
      - name: scaffold_key
        tests: [unique, not_null]
      - name: murcko_scaffold_smiles
        tests: [unique, not_null]

  - name: fact_activity
    description: "Activity fact (one row per measured activity)."
    columns:
      - name: activity_id
        tests: [unique, not_null]
      - name: pchembl_value
        tests: [not_null]
      - name: compound_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key
      - name: target_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_target')
                field: target_key
      - name: assay_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_assay')
                field: assay_key

version: 2

models:
  - name: mart_target_sar
    description: "Potency summary per compound-target pair (median + max pchembl)."
    columns:
      - name: median_pchembl
        tests: [not_null]
      - name: max_pchembl
        tests: [not_null]
      - name: n_measurements
        tests: [not_null]
      - name: compound_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key
      - name: target_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_target')
                field: target_key

  - name: mart_compound_selectivity
    description: "Per-compound selectivity (index = best minus second-best target median)."
    columns:
      - name: compound_key
        tests: [unique, not_null]
      - name: n_targets
        tests: [not_null]

  - name: mart_chemical_space
    description: "Per-compound physicochemical profile, potency summary and approved flag."
    columns:
      - name: compound_key
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key

  - name: mart_compound_catalog
    description: "Per-compound catalog: identity, structure, physchem and potency summary."
    columns:
      - name: compound_key
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key
      - name: molecule_chembl_id
        tests: [not_null]
      - name: best_pchembl
        tests: [not_null]
      - name: n_targets
        tests: [not_null]
      - name: has_pdb
        tests: [not_null]
      - name: n_pdb_entries
        tests: [not_null]

  - name: mart_compound_xref
    description: "Compound external cross-references with resolved URLs."
    columns:
      - name: compound_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key
      - name: source
        tests: [not_null]
      - name: xref_id
        tests: [not_null]

  - name: mart_compound_pdb
    description: "Co-crystal PDB entries per compound, resolved from PDBe ligand codes."
    columns:
      - name: compound_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key
      - name: ligand_code
        tests: [not_null]
      - name: pdb_id
        tests: [not_null]

  - name: mart_compound_fingerprint
    description: "Per-compound ECFP4 fingerprint + Murcko scaffold; substrate for similarity, substructure, series and activity-cliff analytics."
    columns:
      - name: compound_key
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_compound')
                field: compound_key
      - name: scaffold_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_scaffold')
                field: scaffold_key
      - name: ecfp4_hex
        tests: [not_null]
